version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/query.sql"
    schema: "db_init.sql"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
