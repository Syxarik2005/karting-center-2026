services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: volna
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/volna?sslmode=disable
      JWT_SECRET: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
